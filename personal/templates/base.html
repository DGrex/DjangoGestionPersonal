<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>CRUD Personal de la Empresa</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">Sistema de Personal</a>
        <div class="collapse navbar-collapse">
          <div class="navbar-nav me-auto">
            <a class="nav-link" href="{% url 'cargo_list' %}">Cargos (VBF)</a>
            <a class="nav-link" href="{% url 'empleado_list' %}"
              >Empleados (VBF)</a
            >
            <span class="nav-link text-muted">|</span>
            <a class="nav-link text-info" href="{% url 'cargo_list_vbc' %}"
              >Cargos (VBC)</a
            >
            <a class="nav-link text-info" href="{% url 'empleado_list_vbc' %}"
              >Empleados (VBC)</a
            >
          </div>
          <div class="navbar-nav">
            {% if user.is_authenticated %}
            <span class="navbar-text text-white me-3"
              >Bienvenido, <strong>{{ user.username }}</strong></span
            >
            <a class="btn btn-outline-danger btn-sm" href="{% url 'logout' %}"
              >Cerrar Sesión</a
            >
            {% else %}
            <a class="nav-link" href="{% url 'login' %}">Iniciar Sesión</a>
            <a class="btn btn-primary btn-sm ms-2" href="{% url 'registro' %}"
              >Registrarse</a
            >
            {% endif %}
          </div>
        </div>
      </div>
    </nav>
    <div class="container">{% block content %} {% endblock %}</div>
  </body>
</html>
