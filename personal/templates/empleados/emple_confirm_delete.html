{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 text-center shadow-sm border border-danger">
            <h3>¿Estás seguro de eliminar al empleado "{{ objeto }}"?</h3>
            <p class="text-muted">Esta acción no se puede deshacer.</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger px-4">Sí, Eliminar</button>
                <a href="{% url 'empleado_list' %}" class="btn btn-secondary px-4">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
